info.app.name=risk-service
info.app.description=Evaluates trade risk rules
info.app.version=1.0.0

spring.datasource.url=jdbc:h2:mem:risk_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

logging.file.name=C:/tradeflow-workspace/logs/risk-service.log

tradeflow.kafka.topic.trade-created=trade-created-events

spring.kafka.consumer.group-id=risk-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradeflow.risk.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.tradeflow.risk.event.TradeCreatedEvent
spring.kafka.consumer.auto-offset-reset=earliest

# Topic where risk-service publishes the final risk decision.
tradeflow.kafka.topic.trade-risk-evaluated=trade-risk-evaluated-events

# Producer configuration for publishing TradeRiskEvaluatedEvent.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

