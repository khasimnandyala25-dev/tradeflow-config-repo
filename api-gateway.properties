info.app.name=api-gateway
info.app.description=API Gateway config loaded from GitHub Config Repo
info.app.version=1.0.0

server.port=8080

spring.http.clients.connect-timeout=2s
spring.http.clients.read-timeout=2s

spring.cloud.gateway.server.webmvc.routes[0].id=trade-service-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://TRADE-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/trades/**

spring.cloud.gateway.server.webmvc.routes[1].id=reference-data-service-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://REFERENCE-DATA-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/reference/**

management.endpoints.web.exposure.include=health,info,gateway,prometheus,refresh

logging.file.name=C:/tradeflow-workspace/logs/api-gateway.log
